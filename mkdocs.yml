site_name: agentic-evalkit
site_description: Evaluate agentic systems with reproducible, evidence-first grading.
repo_name: agentic-evalkit/agentic-evalkit
repo_url: https://github.com/agentic-evalkit/agentic-evalkit
edit_uri: edit/main/docs/

docs_dir: docs

# Exclude in-progress planning scaffolding from the published site (gitignore
# syntax) so `mkdocs build --strict` succeeds and no draft/internal content
# is published alongside the accepted design, plan, ADRs, and guides.
exclude_docs: |
  plans/*plan-modifications*
  plans/README.md
  release/
  codebase/
  project-scan-report.json

theme:
  name: material
  # Console design system is a g100 dark-only language — no light scheme.
  palette:
    scheme: slate
    primary: black
    accent: cyan
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - content.code.copy
    - content.action.edit
  font:
    text: IBM Plex Sans
    code: IBM Plex Mono

extra_css:
  - stylesheets/tokens.css
  - stylesheets/console.css
  - stylesheets/landing.css

nav:
  - Home: index.md
  - Design: specs/2026-07-02-agentic-evalkit-design.md
  - Plan: plans/2026-07-02-agentic-evalkit-initial-release.md
  - ADRs:
      - "0001: Standalone boundary": adr/0001-standalone-boundary.md
      - "0002: Immutable versioned contracts": adr/0002-immutable-versioned-contracts.md
      - "0003: Provider plugins and Hugging Face baseline": adr/0003-provider-plugins-and-hugging-face-baseline.md
      - "0004: Content-addressed dataset cache": adr/0004-content-addressed-dataset-cache.md
      - "0005: Benchmark adapters and harnesses": adr/0005-benchmark-adapters-and-harnesses.md
      - "0006: Execution target boundary": adr/0006-execution-target-boundary.md
      - "0007: Objective-first grading": adr/0007-objective-first-grading.md
      - "0008: Statistical comparability": adr/0008-statistical-comparability.md
      - "0009: Optional dependencies and plugins": adr/0009-optional-dependencies-and-plugins.md
      - "0010: Offline dataset contract": adr/0010-offline-dataset-contract.md
      - "0011: Offline resolution cache": adr/0011-offline-resolution-cache.md
      - "0012: Grounded-citation probe": adr/0012-grounded-citation-probe.md
  - Guides:
      - Quickstart: guides/quickstart.md
      - Providers: guides/providers.md
      - Graders: guides/graders.md
      - Targets: guides/targets.md
      - SWE-bench: guides/swebench.md
      - HTTP agent example: guides/http-agent-example.md

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - tables
  - toc:
      permalink: true
